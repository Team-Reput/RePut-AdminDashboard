<div class="login-wrapper">
  <div class="form-card">

    <div class="card-logo">
      <img src="/public/reput_logo.png" alt="RePut.ai" class="reput-logo-img" />
    </div>

    <div class="form-header">
      <h2>Create an account</h2>
      <p>Sign up to join reput.ai workspace</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate class="login-form">

      <!-- Full Name -->
      <div class="field" [class.field--error]="isFieldInvalid('full_name')">
        <label for="full_name">Full Name</label>
        <div class="input-wrap">
          <svg class="input-ico" viewBox="0 0 20 20" fill="none">
            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="full_name"
            type="text"
            formControlName="full_name"
            placeholder="John Doe"
            autocomplete="name"
          />
        </div>
        <span class="field-err" *ngIf="isFieldInvalid('full_name')">{{ getFieldError('full_name') }}</span>
      </div>

      <!-- Email -->
      <div class="field" [class.field--error]="isFieldInvalid('email')">
        <label for="email">Work email</label>
        <div class="input-wrap">
          <svg class="input-ico" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="5" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 5l7 6 7-6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@reput.ai"
            autocomplete="email"
          />
        </div>
        <span class="field-err" *ngIf="isFieldInvalid('email')">{{ getFieldError('email') }}</span>
      </div>

      <!-- Password -->
      <div class="field" [class.field--error]="isFieldInvalid('password')">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-ico" viewBox="0 0 20 20" fill="none">
            <rect x="5" y="9" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showPassword" viewBox="0 0 20 20" fill="none">
              <path d="M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 20 20" fill="none">
              <path d="M3 3l14 14M8.46 8.54A2.5 2.5 0 0012.5 12.5M6.18 6.24C4.2 7.42 2.8 9.1 2 10c1.5 2.5 4.5 5 8 5 1.3 0 2.5-.3 3.6-.8M10 5c3.5 0 6.5 2.5 8 5a13 13 0 01-1.7 2.4"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <span class="field-err" *ngIf="isFieldInvalid('password')">{{ getFieldError('password') }}</span>
      </div>

      <div class="form-row">
        <!-- Role -->
        <div class="field" [class.field--error]="isFieldInvalid('role')">
          <label for="role">Role</label>
          <div class="input-wrap">
            <svg class="input-ico" viewBox="0 0 20 20" fill="none">
              <path d="M7.5 11.5L9 10m0 0l4-4m-4 4L6 13M10 5a4 4 0 11-8 0 4 4 0 018 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <select id="role" formControlName="role" class="select-input">
              <option value="user">Standard User</option>
              <option value="sales">Sales Team</option>
              <option value="technical">Technical Team</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <span class="field-err" *ngIf="isFieldInvalid('role')">Role is required.</span>
        </div>

        <!-- Department -->
        <div class="field" [class.field--error]="isFieldInvalid('department')">
          <label for="department">Department</label>
          <div class="input-wrap">
            <svg class="input-ico" viewBox="0 0 20 20" fill="none">
              <path d="M3 17V3a1 1 0 011-1h12a1 1 0 011 1v14M2 17h16M7 6h2m-2 3h2m-2 3h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input
              id="department"
              type="text"
              formControlName="department"
              placeholder="e.g. Sales, Operations"
            />
          </div>
        </div>
      </div>

      <!-- Success Alert -->
      <div class="alert-success" *ngIf="registerSuccess" role="alert">
        <svg viewBox="0 0 20 20" fill="none" class="alert-ico">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {{ registerSuccess }}
      </div>

      <!-- Error Alert -->
      <div class="alert-error" *ngIf="registerError" role="alert">
        <svg viewBox="0 0 20 20" fill="none" class="alert-ico">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 6v4.5M10 13v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        {{ registerError }}
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn-signin" [disabled]="isLoading">
        <ng-container *ngIf="!isLoading">Register</ng-container>
        <ng-container *ngIf="isLoading">
          <span class="spin"></span> Creating account…
        </ng-container>
      </button>

    </form>

    <div class="divider"><span>Already have an account?</span></div>

    <a href="/login" class="btn-login-redirect">Sign In</a>

  </div>
</div>
